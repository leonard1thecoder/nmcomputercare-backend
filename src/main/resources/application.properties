redis.setting.enable=false


spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.open-in-view=false

# ── Resilience4j Rate Limiter ─────────────────────────────────────────────────
# ───────────────────────────────────────────────
# Resilience4j – Rate Limiter configuration
# ───────────────────────────────────────────────

# ── Existing ───────────────────────────────────
resilience4j.ratelimiter.instances.contactFormSubmit.limit-for-period=5
resilience4j.ratelimiter.instances.contactFormSubmit.limit-refresh-period=1m
resilience4j.ratelimiter.instances.contactFormSubmit.timeout-duration=0s

# ── Newsletter ─────────────────────────────────
resilience4j.ratelimiter.instances.newsletterCreate.limit-for-period=10
resilience4j.ratelimiter.instances.newsletterCreate.limit-refresh-period=1m
resilience4j.ratelimiter.instances.newsletterCreate.timeout-duration=0s

# ── Subscription ───────────────────────────────
resilience4j.ratelimiter.instances.subscriptionCreate.limit-for-period=10
resilience4j.ratelimiter.instances.subscriptionCreate.limit-refresh-period=1m
resilience4j.ratelimiter.instances.subscriptionCreate.timeout-duration=0s

resilience4j.ratelimiter.instances.subscriptionCancel.limit-for-period=10
resilience4j.ratelimiter.instances.subscriptionCancel.limit-refresh-period=1m
resilience4j.ratelimiter.instances.subscriptionCancel.timeout-duration=0s




